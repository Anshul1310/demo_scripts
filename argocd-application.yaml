apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nittfest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anshul1310/nittfest-webops-task2
    targetRevision: main
    path: k8s-manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: nittfest
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
