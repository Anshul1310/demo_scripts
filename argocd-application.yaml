apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nittfest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anshul1310/demo_scripts
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: nittfest
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
