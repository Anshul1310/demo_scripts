apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
  namespace: nittfest
  labels:
    app: user-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: anshul8394/user-service:176
          ports:
            - containerPort: 8081
