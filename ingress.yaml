apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nittfest-ingress
  namespace: nittfest
spec:
  ingressClassName: nginx
  rules:
    - host: nittfest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8082
